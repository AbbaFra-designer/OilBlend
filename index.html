<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  input[type=number]{-moz-appearance:textfield}
  input::placeholder{color:#3A3F5A}
  button{-webkit-tap-highlight-color:transparent}
  ::-webkit-scrollbar{width:0}
  @keyframes dropFall{0%{transform:translateY(-60px) scale(.7);opacity:0}50%{transform:translateY(8px) scale(1.05);opacity:1}70%{transform:translateY(-3px) scale(.98)}100%{transform:translateY(0) scale(1);opacity:1}}
  @keyframes fadeUp{0%{transform:translateY(24px);opacity:0}100%{transform:translateY(0);opacity:1}}
  @keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 20px rgba(61,128,234,.3))}50%{filter:drop-shadow(0 0 40px rgba(61,128,234,.6))}}

  @keyframes slideUp{0%{transform:translateY(40px);opacity:0}100%{transform:translateY(0);opacity:1}}
  .splash-logo{animation:dropFall 1.2s cubic-bezier(.34,1.56,.64,1) forwards}
  .splash-logo-glow{animation:pulseGlow 2s ease-in-out infinite;animation-delay:1s}
  .splash-title{animation:fadeUp .8s ease-out .7s both}
  .splash-subtitle{animation:fadeUp .8s ease-out 1s both}
  .splash-tagline{animation:fadeUp .8s ease-out 1.3s both}
  .onboard-field{animation:slideUp .5s ease-out both}
  .btn-primary{position:relative;overflow:hidden;background:linear-gradient(135deg,#3d80ea,#3dc7ec);border:none;border-radius:14px;padding:16px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif;letter-spacing:.8px;text-transform:uppercase;width:100%;box-shadow:0 6px 28px rgba(61,128,234,.3);transition:transform .12s}
  .btn-primary:active{transform:scale(.97)}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(15,17,32,.97);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);padding-bottom:env(safe-area-inset-bottom,8px);max-width:430px;margin:0 auto}
  .content-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:90px}
  @media(max-height:700px){.content-scroll{padding-bottom:80px}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">

const{useState,useEffect}=React;


/* ══════ STORAGE ══════ */
var _s={};function sGet(k){try{var v=localStorage.getItem(k);if(v)return JSON.parse(v);}catch(e){}return _s[k]||null;}function sSet(k,v){_s[k]=v;try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

/* ══════ LOGO ══════ */
function Logo({size,style}){return(<svg width={size} height={size*1.253} viewBox="0 0 503.63 631.19" style={style} xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g36" x1="86.45" y1="165.36" x2="473.35" y2="552.26" gradientUnits="userSpaceOnUse"><stop offset="0" stopColor="#3d80ea"/><stop offset=".45" stopColor="#5c94ed"/><stop offset=".71" stopColor="#94b9f3"/><stop offset="1" stopColor="#fff"/></linearGradient><linearGradient id="g20" x1="141.79" y1="0" x2="141.79" y2="631.19" gradientUnits="userSpaceOnUse"><stop offset="0" stopColor="#3dc7ec"/><stop offset=".42" stopColor="#66d3f0"/><stop offset=".75" stopColor="#b0e8f7"/><stop offset="1" stopColor="#fff"/></linearGradient><linearGradient id="g50" x1="253.92" y1="618.49" x2="253.92" y2="265.98" gradientUnits="userSpaceOnUse"><stop offset="0" stopColor="#17192d"/><stop offset=".59" stopColor="#264279"/><stop offset="1" stopColor="#3d80ea"/></linearGradient></defs><g><path d="M480.21,354.26L251.81,0s70.06,148.29,2.1,265.98c-67.95,117.7-100.39,173.89-100.39,173.89,0,0-47.87,73.38,20.13,143.39,0,0,33.26,35.57,78.16,36.12,20.35,7.63,42.38,11.81,65.4,11.81,102.96,0,186.42-83.46,186.42-186.42,0-32.85-8.51-63.71-23.42-90.51Z" fill="url(#g36)"/><path d="M253.92,265.98l-101.26,175.38c-44.58,77.21,9.16,175.08,98.3,177.09.98.02,1.97.03,2.96.03s1.98-.01,2.96-.03c89.13-2.01,142.87-99.88,98.3-177.09l-101.26-175.38Z" fill="#fff"/><path d="M173.65,583.27c-68-70.01-20.13-143.39-20.13-143.39,0,0,32.44-56.19,100.39-173.89C321.87,148.29,251.81,0,251.81,0L23.42,354.26C8.51,381.07,0,411.92,0,444.77c0,102.96,83.46,186.42,186.42,186.42,23.01,0,45.05-4.18,65.4-11.81-44.9-.55-78.16-36.12-78.16-36.12Z" fill="url(#g20)"/><path d="M253.92,265.98l-101.26,175.38c-44.58,77.21,9.16,175.08,98.3,177.09.98.02,1.97.03,2.96.03s1.98-.01,2.96-.03c89.13-2.01,142.87-99.88,98.3-177.09l-101.26-175.38Z" fill="#3d80ea" opacity=".3"/><path d="M253.92,265.98l-101.26,175.38c-44.58,77.21,9.16,175.08,98.3,177.09.98.02,1.97.03,2.96.03s1.98-.01,2.96-.03c89.13-2.01,142.87-99.88,98.3-177.09l-101.26-175.38Z" fill="url(#g50)"/></g></svg>);}

/* ══════ CALC ══════ */
function calculateBlend(v1,v2,vT){var sw=false;if(v1<v2){var t=v1;v1=v2;v2=t;sw=true;}if(v1<=2||v2<=2||vT<=2)throw new Error("Viscosità deve essere > 2 mm²/s");if(vT>=v1||vT<=v2)throw new Error("Target fuori range: deve essere tra i due oli");var W=function(v){return Math.log10(Math.log10(v+0.8));};var x=(W(vT)-W(v2))/(W(v1)-W(v2));return{oil1Pct:x*100,oil2Pct:(1-x)*100,swapped:sw};}

/* ══════ ISO VG ══════ */
var ISO_VG=[{g:"VG 2",m:2.2,n:1.98,x:2.42},{g:"VG 3",m:3.2,n:2.88,x:3.52},{g:"VG 5",m:4.6,n:4.14,x:5.06},{g:"VG 7",m:6.8,n:6.12,x:7.48},{g:"VG 10",m:10,n:9,x:11},{g:"VG 15",m:15,n:13.5,x:16.5},{g:"VG 22",m:22,n:19.8,x:24.2},{g:"VG 32",m:32,n:28.8,x:35.2},{g:"VG 46",m:46,n:41.4,x:50.6},{g:"VG 68",m:68,n:61.2,x:74.8},{g:"VG 100",m:100,n:90,x:110},{g:"VG 150",m:150,n:135,x:165},{g:"VG 220",m:220,n:198,x:242},{g:"VG 320",m:320,n:288,x:352},{g:"VG 460",m:460,n:414,x:506},{g:"VG 680",m:680,n:612,x:748},{g:"VG 1000",m:1000,n:900,x:1100},{g:"VG 1500",m:1500,n:1350,x:1650},{g:"VG 2200",m:2200,n:1980,x:2420},{g:"VG 3200",m:3200,n:2880,x:3520}];
function findISO(v){if(!v||isNaN(v))return null;return ISO_VG.find(function(g){return v>=g.n&&v<=g.x;})||null;}

/* ══════ TOKENS ══════ */
var T={bg:"#0F1120",bgCard:"rgba(22,26,48,0.85)",bgInput:"rgba(255,255,255,0.04)",accent:"#4FC3F7",accentDim:"rgba(79,195,247,0.12)",accentBorder:"rgba(79,195,247,0.25)",blue:"#3d80ea",cyan:"#3dc7ec",green:"#66BB6A",greenDim:"rgba(102,187,106,0.1)",greenBorder:"rgba(102,187,106,0.25)",yellow:"#FFD54F",yellowDim:"rgba(255,213,79,0.08)",yellowBorder:"rgba(255,213,79,0.2)",red:"#EF5350",redDim:"rgba(239,83,80,0.08)",redBorder:"rgba(239,83,80,0.2)",orange:"#FF8A65",orangeDim:"rgba(255,138,101,0.06)",orangeBorder:"rgba(255,138,101,0.2)",purple:"#AB47BC",text:"#E8EAF0",textDim:"#7B8294",textMuted:"#3A3F5A",border:"rgba(255,255,255,0.06)",font:"'Outfit',sans-serif",mono:"'JetBrains Mono',monospace"};
var ADMIN_PW="OilBlend2026!";

/* ══════ ICONS ══════ */
var CalcIcon=function(p){return(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={p.active?T.accent:T.textMuted} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>);};
var TblIcon=function(p){return(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={p.active?T.accent:T.textMuted} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>);};
var InfoIcon=function(p){return(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={p.active?T.accent:T.textMuted} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>);};
var UserIcon=function(p){return(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={p.active?T.accent:T.textMuted} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>);};

/* ══════ SHARED UI ══════ */
var inpBase={width:"100%",boxSizing:"border-box",padding:"14px 60px 14px 16px",fontSize:16,fontWeight:600,fontFamily:T.font,background:T.bgInput,border:"1.5px solid "+T.border,borderRadius:12,color:T.text,outline:"none",transition:"border-color 0.2s"};
function Inp(p){var tp=p.type||"number";return(<div style={{marginBottom:14}}><label style={{display:"block",fontSize:11,fontWeight:700,color:p.color||T.textDim,textTransform:"uppercase",letterSpacing:1.2,marginBottom:6}}>{p.label}</label><div style={{position:"relative"}}><input type={tp} inputMode={tp==="number"?"decimal":"text"} placeholder={p.placeholder} value={p.value} onChange={function(e){p.onChange(e.target.value);}} onFocus={p.onFocusCb} style={Object.assign({},inpBase,{borderColor:p.value?(p.color?p.color+"40":T.accentBorder):T.border,paddingRight:p.unit?60:16})}/>{p.unit&&<span style={{position:"absolute",right:16,top:"50%",transform:"translateY(-50%)",fontSize:12,color:T.textDim,fontWeight:500,pointerEvents:"none"}}>{p.unit}</span>}</div></div>);}
function Notice(p){var s={yellow:{bg:T.yellowDim,bd:T.yellowBorder,c:T.yellow,i:"⚠️"},red:{bg:T.redDim,bd:T.redBorder,c:T.red,i:"✕"},green:{bg:T.greenDim,bd:T.greenBorder,c:T.green,i:"✓"},blue:{bg:T.accentDim,bd:T.accentBorder,c:T.accent,i:"ℹ"}}[p.type];return(<div style={{padding:"12px 14px",borderRadius:10,background:s.bg,border:"1px solid "+s.bd,fontSize:13,color:s.c,lineHeight:1.6,marginTop:12,display:"flex",gap:8,alignItems:"flex-start"}}><span style={{flexShrink:0}}>{s.i}</span><span>{p.children}</span></div>);}
function Bar(p){const[w,setW]=useState(0);useEffect(function(){setW(0);setTimeout(function(){setW(p.a);},60);},[p.a]);return(<div style={{display:"flex",borderRadius:10,overflow:"hidden",height:36,background:"rgba(0,0,0,0.3)",border:"1px solid "+T.border,marginTop:14}}><div style={{width:w+"%",transition:"width 0.8s cubic-bezier(.4,0,.2,1)",background:"linear-gradient(90deg,"+T.blue+","+T.cyan+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#fff",minWidth:w>10?52:0,overflow:"hidden"}}>{w>10&&p.a.toFixed(1)+"%"}</div><div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:T.orange,background:T.orangeDim}}>{p.b.toFixed(1)+"%"}</div></div>);}

/* ══════════════════════════════════════
   SPLASH
   ══════════════════════════════════════ */
function Splash({onDone}){
  const[f,setF]=useState(false);
  useEffect(function(){var t1=setTimeout(function(){setF(true);},2800);var t2=setTimeout(onDone,3400);return function(){clearTimeout(t1);clearTimeout(t2);};},[]);
  return(<div style={{position:"fixed",inset:0,zIndex:100,background:"radial-gradient(ellipse at 50% 40%,#1a2340 0%,#0F1120 70%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",opacity:f?0:1,transition:"opacity 0.6s"}}><div className="splash-logo splash-logo-glow"><Logo size={Math.min(120,window.innerWidth*.28)}/></div><div className="splash-title" style={{marginTop:28,fontSize:Math.min(36,window.innerWidth*.09),fontWeight:900,letterSpacing:-1,background:"linear-gradient(135deg,#3d80ea,#3dc7ec,#fff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>OilBlend</div><div className="splash-subtitle" style={{marginTop:8,fontSize:13,color:T.textDim,textAlign:"center",maxWidth:280,lineHeight:1.5,padding:"0 20px"}}>Il calcolatore tecnico di viscosità<br/>per oli industriali</div></div>);
}

/* ══════════════════════════════════════
   AUTH SCREEN — Accesso Semplificato
   ══════════════════════════════════════ */
function CalcScreen(p){
  const[v1,setV1]=useState("");const[v2,setV2]=useState("");const[vT,setVT]=useState("");
  const[liters,setLiters]=useState("");const[error,setError]=useState(null);
  useEffect(function(){if(p.fillValue===null)return;var val=p.fillValue.toString();if(p.lastFocused==="v1")setV1(val);else if(p.lastFocused==="v2")setV2(val);else setVT(val);},[p.fillValue]);
  function calc(){
    var a=parseFloat(v1),b=parseFloat(v2),t=parseFloat(vT);
    if(isNaN(a)||isNaN(b)||isNaN(t)){setError("Inserisci tutti e tre i valori di viscosità.");p.setResult(null);return;}
    try{var r=calculateBlend(a,b,t);var tL=parseFloat(liters);
      p.setResult({oil1Pct:r.oil1Pct,oil2Pct:r.oil2Pct,swapped:r.swapped,v1:a,v2:b,vT:t,liters:(!isNaN(tL)&&tL>0)?tL:null,isoMatch:findISO(t)});setError(null);
    }catch(e){setError(e.message);p.setResult(null);}
  }
  function reset(){setV1("");setV2("");setVT("");setLiters("");setError(null);p.setResult(null);}
  var R=p.result;
  return(
    <div style={{padding:"16px 18px 24px"}}>
      <h1 style={{fontSize:Math.min(22,window.innerWidth*.055),fontWeight:800,color:T.text,margin:"0 0 4px",letterSpacing:-.5}}>Viscosity Blending Calculator</h1>
      <p style={{fontSize:13,color:T.textDim,margin:"0 0 6px"}}>Inserisci i valori di viscosità cinematica</p>
      <div style={{padding:"8px 12px",borderRadius:8,background:T.yellowDim,border:"1px solid "+T.yellowBorder,fontSize:12,color:T.yellow,marginBottom:16}}>🌡️ Tutti i valori devono essere riferiti a <strong>40°C</strong> (norma ASTM D341)</div>

      <Inp label="Viscosità Olio 1 (mm²/s)" value={v1} onChange={setV1} placeholder="es. 220" unit="mm²/s" color={T.accent} onFocusCb={function(){p.setLastFocused("v1");}}/>
      <Inp label="Viscosità Olio 2 (mm²/s)" value={v2} onChange={setV2} placeholder="es. 68" unit="mm²/s" color={T.orange} onFocusCb={function(){p.setLastFocused("v2");}}/>
      <Inp label="Viscosità Finale desiderata (mm²/s)" value={vT} onChange={setVT} placeholder="es. 150" unit="mm²/s" color={T.purple} onFocusCb={function(){p.setLastFocused("vT");}}/>
      <Inp label="Quantità totale (litri) — opzionale" value={liters} onChange={setLiters} placeholder="opzionale" unit="L"/>

      <div style={{display:"flex",gap:10,marginTop:14}}>
        <button className="btn-primary" onClick={calc}>CALCOLA</button>
        {(v1||v2||vT)&&<button onClick={reset} style={{padding:"16px 18px",borderRadius:14,border:"1.5px solid "+T.border,background:"transparent",color:T.textDim,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:T.font,flexShrink:0}}>Reset</button>}
      </div>
      {error&&<Notice type="red">{error}</Notice>}
      {R&&R.swapped&&<Notice type="yellow">I valori sono stati scambiati: Olio 1 è quello più viscoso.</Notice>}
      {R&&!error&&(
        <div style={{marginTop:20,borderRadius:18,overflow:"hidden",background:T.bgCard,border:"1px solid "+T.accentBorder,boxShadow:"0 8px 40px rgba(61,128,234,0.08)"}}>
          <div style={{padding:"16px 18px 14px",background:"linear-gradient(135deg,"+T.accentDim+",transparent)",borderBottom:"1px solid "+T.border}}>
            <div style={{fontSize:10,color:T.textDim,textTransform:"uppercase",letterSpacing:1.4,fontWeight:700,marginBottom:4}}>Risultato Miscela <span style={{color:T.yellow}}>@ 40°C</span></div>
            <Bar a={R.oil1Pct} b={R.oil2Pct}/>
          </div>
          <div style={{display:"flex",gap:10,padding:"12px 16px"}}>
            <div style={{flex:1,padding:"12px",borderRadius:14,background:T.accentDim,border:"1px solid "+T.accentBorder,textAlign:"center"}}>
              <div style={{fontSize:9,color:T.accent,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Olio 1 {R.swapped?"(più viscoso)":""}</div>
              <div style={{fontFamily:T.mono,fontSize:26,fontWeight:700,color:T.accent,lineHeight:1}}>{R.oil1Pct.toFixed(1)}<span style={{fontSize:14}}>%</span></div>
              {R.liters&&<div style={{fontFamily:T.mono,fontSize:14,fontWeight:600,color:T.accent,marginTop:4,opacity:.8}}>{(R.liters*R.oil1Pct/100).toFixed(1)} L</div>}
              <div style={{fontSize:11,color:T.textDim,marginTop:4}}>{R.swapped?R.v2:R.v1} mm²/s</div>
            </div>
            <div style={{flex:1,padding:"12px",borderRadius:14,background:T.orangeDim,border:"1px solid "+T.orangeBorder,textAlign:"center"}}>
              <div style={{fontSize:9,color:T.orange,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Olio 2</div>
              <div style={{fontFamily:T.mono,fontSize:26,fontWeight:700,color:T.orange,lineHeight:1}}>{R.oil2Pct.toFixed(1)}<span style={{fontSize:14}}>%</span></div>
              {R.liters&&<div style={{fontFamily:T.mono,fontSize:14,fontWeight:600,color:T.orange,marginTop:4,opacity:.8}}>{(R.liters*R.oil2Pct/100).toFixed(1)} L</div>}
              <div style={{fontSize:11,color:T.textDim,marginTop:4}}>{R.swapped?R.v1:R.v2} mm²/s</div>
            </div>
          </div>
          {R.isoMatch&&(<div style={{margin:"0 16px 12px",padding:"10px 12px",borderRadius:10,background:T.greenDim,border:"1px solid "+T.greenBorder,fontSize:12,color:T.green,fontWeight:600}}>{"✓ Target = ISO "+R.isoMatch.g+" ("+R.isoMatch.n+"–"+R.isoMatch.x+" mm²/s)"}</div>)}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════
   SCREEN 2 — ISO VG
   ══════════════════════════════════════ */
function ISOScreen(p){
  var mg=(p.result&&p.result.isoMatch)?p.result.isoMatch.g:null;
  return(
    <div style={{padding:"16px 14px 24px"}}>
      <h2 style={{fontSize:18,fontWeight:800,color:T.text,margin:"0 0 2px 4px"}}>Tabella ISO VG</h2>
      <p style={{fontSize:12,color:T.textDim,margin:"0 0 8px 4px"}}>Viscosità cinematica a 40°C — tocca una riga per usarla</p>
      <Notice type="blue">Tocca un grado per inserirne il valore mediano nell'ultimo campo selezionato.{mg&&<span><br/><strong style={{color:T.green}}>Verde</strong> = risultato attuale.</span>}</Notice>
      <div style={{height:14}}></div>
      <div style={{borderRadius:14,overflow:"hidden",border:"1px solid "+T.border}}>

function App(){
  const[showSplash,setShowSplash]=useState(true);
  const[tab,setTab]=useState("calc");const[lastFocused,setLastFocused]=useState("vT");
  const[result,setResult]=useState(null);const[fillValue,setFillValue]=useState(null);const[fillCounter,setFillCounter]=useState(0);

  if(showSplash)return <Splash onDone={function(){setShowSplash(false);}}/>;

  function handleISOTap(m){setFillValue(m);setFillCounter(function(c){return c+1;});setTab("calc");}

  var tabs=[{id:"calc",label:"Calcolo",Icon:CalcIcon},{id:"table",label:"ISO VG",Icon:TblIcon},{id:"info",label:"Info",Icon:InfoIcon}];

  return(
    <div style={{maxWidth:430,margin:"0 auto",height:"100%",background:"linear-gradient(175deg,"+T.bg+" 0%,#0a0d1a 50%,"+T.bg+" 100%)",fontFamily:T.font,color:T.text,display:"flex",flexDirection:"column",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-100,right:-60,width:280,height:280,borderRadius:"50%",background:"radial-gradient(circle,rgba(61,128,234,0.06),transparent 70%)",pointerEvents:"none"}}/>
      <div style={{padding:"max(env(safe-area-inset-top,8px),8px) 18px 8px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid "+T.border,flexShrink:0}}>
        <Logo size={26}/><div style={{fontSize:15,fontWeight:800,letterSpacing:-.3,background:"linear-gradient(90deg,#3d80ea,#3dc7ec)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>OilBlend</div>
      </div>
      <div className="content-scroll">
        {tab==="calc"&&<CalcScreen key={fillCounter} lastFocused={lastFocused} setLastFocused={setLastFocused} result={result} setResult={setResult} fillValue={fillValue}/>}
        {tab==="table"&&<ISOScreen result={result} onTap={handleISOTap}/>}
        {tab==="info"&&<InfoScreen/>}
      </div>
      <div className="bottom-nav"><div style={{display:"flex",paddingTop:8}}>
        {tabs.map(function(t){var a=tab===t.id;return(<button key={t.id} onClick={function(){setTab(t.id);}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"4px 0",fontFamily:T.font}}><div style={{padding:"4px 14px",borderRadius:16,background:a?T.accentDim:"transparent",transition:"background 0.25s"}}><t.Icon active={a}/></div><span style={{fontSize:10,fontWeight:a?700:500,color:a?T.accent:T.textMuted,letterSpacing:.3}}>{t.label}</span></button>);})}
      </div></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

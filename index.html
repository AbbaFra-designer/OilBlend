/* ══════ CALC ══════ */
function calculateBlend(v1,v2,vT){var sw=false;if(v1<v2){var t=v1;v1=v2;v2=t;sw=true;}if(v1<=2||v2<=2||vT<=2)throw new Error("Viscosità deve essere > 2 mm²/s");if(vT>=v1||vT<=v2)throw new Error("Target fuori range: deve essere tra i due oli");var W=function(v){return Math.log10(Math.log10(v+0.8));};var x=(W(vT)-W(v2))/(W(v1)-W(v2));return{oil1Pct:x*100,oil2Pct:(1-x)*100,swapped:sw};}

   AUTH SCREEN (Login / Register)
   ══════════════════════════════════════ */

  const[mode,setMode]=useState("login"); // login | register
  const[showSplash,setShowSplash]=useState(true);
  const[name,setName]=useState("");const[company,setCompany]=useState("");
  const[email,setEmail]=useState("");const[phone,setPhone]=useState("");

  async function handleLogin(){
    if(!email.trim()){setErr("Inserisci la tua email");return;}
    setLoading(true);setErr(null);
    try{
      var res=await fetch(SB_URL+"/rest/v1/oilblend_users?email=eq."+encodeURIComponent(email.trim())+"&select=*",{method:"GET",headers:HD});
      if(!res.ok)throw new Error("Errore server");
      var data=await res.json();
      if(!data||data.length===0){setErr("Email non trovata. Registrati prima.");setLoading(false);return;}
      var u=data[0];sSet("oilblend_user",u);onAuth(u);
    }catch(e){setErr(e.message||"Errore di connessione");}
    setLoading(false);
  }

  async function handleRegister(){
    if(!name.trim()||!company.trim()||!email.trim()||!phone.trim()){setErr("Compila tutti i campi");return;}
    if(!/\S+@\S+\.\S+/.test(email)){setErr("Email non valida");return;}
    setLoading(true);setErr(null);
    try{
      // Check if email exists
      var chk=await fetch(SB_URL+"/rest/v1/oilblend_users?email=eq."+encodeURIComponent(email.trim())+"&select=id",{method:"GET",headers:HD});
      var existing=await chk.json();
      if(existing&&existing.length>0){setErr("Email già registrata. Effettua il login.");setLoading(false);return;}
      await sbInsert("oilblend_users",{name:name.trim(),company:company.trim(),email:email.trim(),phone:phone.trim()});
      var u={name:name.trim(),company:company.trim(),email:email.trim(),phone:phone.trim()};
      sSet("oilblend_user",u);onAuth(u);
    }catch(e){setErr(e.message||"Errore di registrazione");}
    setLoading(false);
  }

  var regFields=[
    {k:"name",l:"Nome e Cognome",v:name,s:setName,p:"Mario Rossi",t:"text",i:"👤",d:0},
    {k:"company",l:"Azienda",v:company,s:setCompany,p:"Es. Petroli SpA",t:"text",i:"🏭",d:.06},
    {k:"email",l:"Email",v:email,s:setEmail,p:"mario@azienda.it",t:"email",i:"✉️",d:.12},

      </div>
      <div style={{padding:"0 24px 40px",flex:1}}>
        {mode==="login"?(
          <div>
            <div className="onboard-field" style={{animationDelay:".6s",marginBottom:16}}>

          regFields.map(function(f){return(
            <div key={f.k} className="onboard-field" style={{marginBottom:14,animationDelay:(0.6+f.d)+"s"}}>
              <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,fontWeight:700,color:T.textDim,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}><span>{f.i}</span> {f.l}</label>
              <input type={f.t} value={f.v} placeholder={f.p} onChange={function(e){f.s(e.target.value);}} style={is}/>
            </div>
          );})
        )}

        {err&&<div style={{padding:"10px 14px",borderRadius:10,background:T.redDim,border:"1px solid "+T.redBorder,fontSize:13,color:T.red,marginBottom:14}}>{err}</div>}

        <div className="onboard-field" style={{animationDelay:"1s",marginTop:20}}>
          <button className="btn-primary" onClick={mode==="login"?handleLogin:handleRegister} disabled={loading} style={{opacity:loading?.7:1,backgroundSize:loading?"200% 100%":"100% 100%",animation:loading?"shimmer 1.5s linear infinite":"none"}}>{loading?"Caricamento...":(mode==="login"?"ACCEDI":"REGISTRATI")}</button>
        </div>

        <div className="onboard-field" style={{animationDelay:"1.1s",textAlign:"center",marginTop:20}}>
          {mode==="login"?(
            <p style={{fontSize:13,color:T.textDim}}>Non hai un account? <button onClick={function(){setMode("register");setErr(null);}} style={{background:"none",border:"none",color:T.accent,fontWeight:700,cursor:"pointer",fontFamily:T.font,fontSize:13,textDecoration:"underline"}}>Registrati</button></p>
          ):(
            <p style={{fontSize:13,color:T.textDim}}>Hai già un account? <button onClick={function(){setMode("login");setErr(null);}} style={{background:"none",border:"none",color:T.accent,fontWeight:700,cursor:"pointer",fontFamily:T.font,fontSize:13,textDecoration:"underline"}}>Accedi</button></p>
          )}
        </div>

        <div style={{textAlign:"center",marginTop:24,fontSize:10,color:T.textMuted,lineHeight:1.6}}>
          Registrandoti accetti la <strong style={{color:T.textDim}}>Privacy Policy</strong> e i <strong style={{color:T.textDim}}>Termini di Servizio</strong> visibili nella sezione Info dell'app.
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   SCREEN 1 — Calculator
   ══════════════════════════════════════ */
function CalcScreen(p){
  const[v1,setV1]=useState("");const[v2,setV2]=useState("");const[vT,setVT]=useState("");
  const[liters,setLiters]=useState("");const[error,setError]=useState(null);
  useEffect(function(){if(p.fillValue===null)return;var val=p.fillValue.toString();if(p.lastFocused==="v1")setV1(val);else if(p.lastFocused==="v2")setV2(val);else setVT(val);},[p.fillValue]);
  function calc(){
    var a=parseFloat(v1),b=parseFloat(v2),t=parseFloat(vT);
    if(isNaN(a)||isNaN(b)||isNaN(t)){setError("Inserisci tutti e tre i valori di viscosità.");p.setResult(null);return;}
    try{var r=calculateBlend(a,b,t);var tL=parseFloat(liters);
      p.setResult({oil1Pct:r.oil1Pct,oil2Pct:r.oil2Pct,swapped:r.swapped,v1:a,v2:b,vT:t,liters:(!isNaN(tL)&&tL>0)?tL:null,isoMatch:findISO(t)});setError(null);
    }catch(e){setError(e.message);p.setResult(null);}
  }
  function reset(){setV1("");setV2("");setVT("");setLiters("");setError(null);p.setResult(null);}
  var R=p.result;
  return(
    <div style={{padding:"16px 18px 24px"}}>
      <h1 style={{fontSize:Math.min(22,window.innerWidth*.055),fontWeight:800,color:T.text,margin:"0 0 4px",letterSpacing:-.5}}>Viscosity Blending Calculator</h1>
      <p style={{fontSize:13,color:T.textDim,margin:"0 0 6px"}}>Inserisci i valori di viscosità cinematica</p>
      <div style={{padding:"8px 12px",borderRadius:8,background:T.yellowDim,border:"1px solid "+T.yellowBorder,fontSize:12,color:T.yellow,marginBottom:16}}>🌡️ Tutti i valori devono essere riferiti a <strong>40°C</strong> (norma ASTM D341)</div>

      <Inp label="Viscosità Olio 1 (mm²/s)" value={v1} onChange={setV1} placeholder="es. 220" unit="mm²/s" color={T.accent} onFocusCb={function(){p.setLastFocused("v1");}}/>
      <Inp label="Viscosità Olio 2 (mm²/s)" value={v2} onChange={setV2} placeholder="es. 68" unit="mm²/s" color={T.orange} onFocusCb={function(){p.setLastFocused("v2");}}/>
      <Inp label="Viscosità Finale desiderata (mm²/s)" value={vT} onChange={setVT} placeholder="es. 150" unit="mm²/s" color={T.purple} onFocusCb={function(){p.setLastFocused("vT");}}/>
      <Inp label="Quantità totale (litri) — opzionale" value={liters} onChange={setLiters} placeholder="opzionale" unit="L"/>

      <div style={{display:"flex",gap:10,marginTop:14}}>
        <button className="btn-primary" onClick={calc}>CALCOLA</button>
        {(v1||v2||vT)&&<button onClick={reset} style={{padding:"16px 18px",borderRadius:14,border:"1.5px solid "+T.border,background:"transparent",color:T.textDim,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:T.font,flexShrink:0}}>Reset</button>}
      </div>
      {error&&<Notice type="red">{error}</Notice>}
      {R&&R.swapped&&<Notice type="yellow">I valori sono stati scambiati: Olio 1 è quello più viscoso.</Notice>}
      {R&&!error&&(
        <div style={{marginTop:20,borderRadius:18,overflow:"hidden",background:T.bgCard,border:"1px solid "+T.accentBorder,boxShadow:"0 8px 40px rgba(61,128,234,0.08)"}}>
          <div style={{padding:"16px 18px 14px",background:"linear-gradient(135deg,"+T.accentDim+",transparent)",borderBottom:"1px solid "+T.border}}>
            <div style={{fontSize:10,color:T.textDim,textTransform:"uppercase",letterSpacing:1.4,fontWeight:700,marginBottom:4}}>Risultato Miscela <span style={{color:T.yellow}}>@ 40°C</span></div>
            <Bar a={R.oil1Pct} b={R.oil2Pct}/>
          </div>
          <div style={{display:"flex",gap:10,padding:"12px 16px"}}>
            <div style={{flex:1,padding:"12px",borderRadius:14,background:T.accentDim,border:"1px solid "+T.accentBorder,textAlign:"center"}}>
              <div style={{fontSize:9,color:T.accent,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Olio 1 {R.swapped?"(più viscoso)":""}</div>
              <div style={{fontFamily:T.mono,fontSize:26,fontWeight:700,color:T.accent,lineHeight:1}}>{R.oil1Pct.toFixed(1)}<span style={{fontSize:14}}>%</span></div>
              {R.liters&&<div style={{fontFamily:T.mono,fontSize:14,fontWeight:600,color:T.accent,marginTop:4,opacity:.8}}

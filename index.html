    if (saved && typeof i18n !== 'undefined' && i18n[saved]) return saved;
  } catch(e){}
  return navigator.language.toLowerCase().startsWith('en') ? 'en' : 'it';
})();

function t(key) {
  var lang = i18n[currentLang];
  return (lang && lang[key] !== undefined) ? lang[key] : (i18n.it && i18n.it[key] !== undefined ? i18n.it[key] : key);
}

function applyTranslations(lang) {
  var tr = i18n[lang];
  if (!tr) return;
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    if (tr[key] !== undefined) el.textContent = tr[key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
    var key = el.getAttribute('data-i18n-placeholder');
    if (tr[key] !== undefined) el.placeholder = tr[key];
  });
  document.querySelectorAll('[data-i18n-title]').forEach(function(el) {
    var key = el.getAttribute('data-i18n-title');
    if (tr[key] !== undefined) el.title = tr[key];
  });
  document.documentElement.setAttribute('lang', lang);
}

function updateToggleUI(lang) {
  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    btn.classList.remove('active');
    btn.setAttribute('aria-pressed', 'false');
  });
  var activeBtn = document.getElementById('lang-btn-' + lang);
  if (activeBtn) {
    activeBtn.classList.add('active');
    activeBtn.setAttribute('aria-pressed', 'true');
  }
}

function setLanguage(lang) {
  currentLang = lang;
  try { localStorage.setItem('oilblend-lang', lang); } catch(e) {}
  applyTranslations(lang);
  updateToggleUI(lang);
  document.dispatchEvent(new CustomEvent('oilblend-langchange', { detail: lang }));
}

function getDefaultLang() {
  try {
    var saved = localStorage.getItem('oilblend-lang');
    if (saved && i18n[saved]) return saved;
  } catch(e) {}
  return navigator.language.toLowerCase().startsWith('en') ? 'en' : 'it';
}

document.addEventListener('DOMContentLoaded', function() {
  setLanguage(getDefaultLang());
});
</script>

      </div>
      {error&&<Notice type="red">{t(error)}</Notice>}
      {R&&R.swapped&&<Notice type="yellow">{t('swappedNotice')}</Notice>}
      {R&&!error&&(
        <div style={{marginTop:20,borderRadius:18,overflow:"hidden",background:T.bgCard,border:"1px solid "+T.accentBorder,boxShadow:"0 8px 40px rgba(61,128,234,0.08)"}}>
          <div style={{padding:"16px 18px 14px",background:"linear-gradient(135deg,"+T.accentDim+",transparent)",borderBottom:"1px solid "+T.border}}>
            <div style={{fontSize:10,color:T.textDim,textTransform:"uppercase",letterSpacing:1.4,fontWeight:700,marginBottom:4}}><span data-i18n="resultLabel">{t('resultLabel')}</span> <span style={{color:T.yellow}}>@ 40°C</span></div>

              <div style={{fontFamily:T.mono,fontSize:26,fontWeight:700,color:T.accent,lineHeight:1}}>{R.oil1Pct.toFixed(1)}<span style={{fontSize:14}}>%</span></div>
              {R.liters&&<div style={{fontFamily:T.mono,fontSize:14,fontWeight:600,color:T.accent,marginTop:4,opacity:.8}}>{(R.liters*R.oil1Pct/100).toFixed(1)} L</div>}

            </div>
            <div style={{flex:1,padding:"12px",borderRadius:14,background:T.orangeDim,border:"1px solid "+T.orangeBorder,textAlign:"center"}}>
              <div data-i18n="oil2ResultLabel" style={{fontSize:9,color:T.orange,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{t('oil2ResultLabel')}</div>
              <div style={{fontFamily:T.mono,fontSize:26,fontWeight:700,color:T.orange,lineHeight:1}}>{R.oil2Pct.toFixed(1)}<span style={{fontSize:14}}>%</span></div>
              {R.liters&&<div style={{fontFamily:T.mono,fontSize:14,fontWeight:600,color:T.orange,marginTop:4,opacity:.8}}>{(R.liters*R.oil2Pct/100).toFixed(1)} L</div>}
              <div style={{fontSize:11,color:T.textDim,marginTop:4}}>{R.swapped?R.v1:R.v2} mm²/s</div>
            </div>
          </div>
          {R.isoMatch&&(<div style={{margin:"0 16px 12px",padding:"10px 12px",borderRadius:10,background:T.greenDim,border:"1px solid "+T.greenBorder,fontSize:12,color:T.green,fontWeight:600}}>{t('isoMatchPrefix')+R.isoMatch.g+" ("+R.isoMatch.n+"–"+R.isoMatch.x+" mm²/s)"}</div>)}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════
   SCREEN 2 — ISO VG
   ══════════════════════════════════════ */
function ISOScreen(p){
  var mg=(p.result&&p.result.isoMatch)?p.result.isoMatch.g:null;
  return(
    <div style={{padding:"16px 14px 24px"}}>
      <h2 data-i18n="isoTitle" style={{fontSize:18,fontWeight:800,color:T.text,margin:"0 0 2px 4px"}}>{t('isoTitle')}</h2>
      <p data-i18n="isoSubtitle" style={{fontSize:12,color:T.textDim,margin:"0 0 8px 4px"}}>{t('isoSubtitle')}</p>
      <Notice type="blue"><span data-i18n="isoNotice">{t('isoNotice')}</span>{mg&&<span><br/><strong data-i18n="isoGreenWord" style={{color:T.green}}>{t('isoGreenWord')}</strong><span data-i18n="isoGreenSuffix">{t('isoGreenSuffix')}</span></span>}</Notice>
      <div style={{height:14}}></div>
      <div style={{borderRadius:14,overflow:"hidden",border:"1px solid "+T.border}}>
        <div style={{display:"grid",gridTemplateColumns:"1.2fr 1fr 1fr 1fr",padding:"10px 12px",background:T.accentDim,borderBottom:"1px solid "+T.border,fontSize:10,fontWeight:700,color:T.accent,textTransform:"uppercase",letterSpacing:1}}><div data-i18n="isoColGrade">{t('isoColGrade')}</div><div data-i18n="isoColMid" style={{textAlign:"right"}}>{t('isoColMid')}</div><div data-i18n="isoColMin" style={{textAlign:"right"}}>{t('isoColMin')}</div><div data-i18n="isoColMax" style={{textAlign:"right"}}>{t('isoColMax')}</div></div>
        {ISO_VG.map(function(g,i){var mt=mg===g.g;return(
          <div key={g.g} onClick={function(){p.onTap(g.m);}} style={{display:"grid",gridTemplateColumns:"1.2fr 1fr 1fr 1fr",padding:"11px 12px",cursor:"pointer",background:mt?T.greenDim:(i%2===0?"rgba(255,255,255,0.01)":"rgba(255,255,255,0.025)"),borderBottom:"1px solid "+T.border,borderLeft:mt?"3px solid "+T.green:"3px solid transparent",alignItems:"center"}}>
            <div style={{fontWeight:700,fontSize:12,color:mt?T.green:T.text}}>{"ISO "+g.g}</div>
            <div style={{textAlign:"right",fontFamily:T.mono,fontWeight:700,fontSize:13,color:mt?T.green:T.accent}}>{g.m}</div>
            <div style={{textAlign:"right",fontFamily:T.mono,fontSize:12,color:T.textDim}}>{g.n}</div>
            <div style={{textAlign:"right",fontFamily:T.mono,fontSize:12,color:T.textDim}}>{g.x}</div>
          </div>
        );})}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   SCREEN 3 — Info + Policies
   ══════════════════════════════════════ */

  var h3s={fontSize:15,fontWeight:700,color:T.text,margin:"22px 0 8px"};var ps={fontSize:13,color:T.textDim,lineHeight:1.7,margin:"0 0 8px"};

      <div style={{padding:"14px 16px",borderRadius:14,background:T.yellowDim,border:"1px solid "+T.yellowBorder,fontSize:13,color:T.yellow,lineHeight:1.6}}><strong data-i18n="infoWarningTitle">{t('infoWarningTitle')}</strong><br/><span data-i18n="infoWarningPre">{t('infoWarningPre')}</span> <strong data-i18n="infoWarningBold">{t('infoWarningBold')}</strong><span data-i18n="infoWarningMid">{t('infoWarningMid')}</span> <strong>2 mm²/s</strong>.</div>
      <h3 data-i18n="infoMethodTitle" style={h3s}>{t('infoMethodTitle')}</h3>
      <p data-i18n="infoMethodText" style={ps}>{t('infoMethodText')}</p>
      <h3 data-i18n="infoFormulaTitle" style={h3s}>{t('infoFormulaTitle')}</h3>
      <div style={{padding:"14px",borderRadius:14,background:"rgba(255,255,255,0.03)",border:"1px solid "+T.border,fontFamily:T.mono,fontSize:12,color:T.accent,lineHeight:2.2,overflowX:"auto"}}>
        <div data-i18n="infoFormulaComment1" style={{color:T.textDim,fontSize:10}}>{t('infoFormulaComment1')}</div><div>{"W(ν) = log₁₀(log₁₀(ν + 0.8))"}</div>
        <div data-i18n="infoFormulaComment2" style={{marginTop:8,color:T.textDim,fontSize:10}}>{t('infoFormulaComment2')}</div><div>{"x = (W(ν_t) − W(ν₂)) / (W(ν₁) − W(ν₂))"}</div>

        <strong data-i18n="privacyDocTitle" style={{color:T.text,fontSize:14}}>{t('privacyDocTitle')}</strong><br/><br/>
        <strong data-i18n="privacyLastUpdatedLabel" style={{color:T.text}}>{t('privacyLastUpdatedLabel')}</strong> <span data-i18n="privacyLastUpdatedDate">{t('privacyLastUpdatedDate')}</span><br/><br/>
        <strong data-i18n="privacy1Title" style={{color:T.text}}>{t('privacy1Title')}</strong><br/>
        <span data-i18n="privacy1Text">{t('privacy1Text')}</span><br/><br/>
        <strong data-i18n="privacy2Title" style={{color:T.text}}>{t('privacy2Title')}</strong><br/>
        <span data-i18n="privacy2Text">{t('privacy2Text')}</span><br/><br/>
        <strong data-i18n="privacy3Title" style={{color:T.text}}>{t('privacy3Title')}</strong><br/>
        <span data-i18n="privacy3Text">{t('privacy3Text')}</span><br/><br/>
        <strong data-i18n="privacy4Title" style={{color:T.text}}>{t('privacy4Title')}</strong><br/>
        <span data-i18n="privacy4Text">{t('privacy4Text')}</span><br/><br/>
        <strong data-i18n="privacy5Title" style={{color:T.text}}>{t('privacy5Title')}</strong><br/>
        <span data-i18n="privacy5Text">{t('privacy5Text')}</span><br/><br/>
        <strong data-i18n="privacy6Title" style={{color:T.text}}>{t('privacy6Title')}</strong><br/>
        <span data-i18n="privacy6Text">{t('privacy6Text')}</span><br/><br/>
        <strong data-i18n="privacy7Title" style={{color:T.text}}>{t('privacy7Title')}</strong><br/>
        <span data-i18n="privacy7Text">{t('privacy7Text')}</span> <a href="mailto:info@nuovabravol.it">Nuova Bravol Srl</a><br/><br/>
        <strong data-i18n="privacy8Title" style={{color:T.text}}>{t('privacy8Title')}</strong><br/>
        <span data-i18n="privacy8Text">{t('privacy8Text')}</span>
      </div>)}

      {policyBtn(t('cookieBtn'),"cookies","cookieBtn")}
      {showPolicy==="cookies"&&(<div style={{padding:"16px",borderRadius:12,background:"rgba(255,255,255,0.02)",border:"1px solid "+T.border,marginBottom:12,fontSize:12,color:T.textDim,lineHeight:1.8}}>
        <strong data-i18n="cookieDocTitle" style={{color:T.text,fontSize:14}}>{t('cookieDocTitle')}</strong><br/><br/>
        <strong data-i18n="cookie1Title" style={{color:T.text}}>{t('cookie1Title')}</strong><br/>
        <span data-i18n="cookie1Text">{t('cookie1Text')}</span><br/><br/>
        <strong data-i18n="cookie2Title" style={{color:T.text}}>{t('cookie2Title')}</strong><br/>
        <span data-i18n="cookie2Text">{t('cookie2Text')}</span><br/><br/>
        <strong data-i18n="cookie3Title" style={{color:T.text}}>{t('cookie3Title')}</strong><br/>
        <span data-i18n="cookie3Text">{t('cookie3Text')}</span><br/><br/>
        <strong data-i18n="cookie4Title" style={{color:T.text}}>{t('cookie4Title')}</strong><br/>
        <span data-i18n="cookie4Text">{t('cookie4Text')}</span><br/><br/>

      {policyBtn(t('termsBtn'),"terms","termsBtn")}

        <strong data-i18n="terms2Title" style={{color:T.text}}>{t('terms2Title')}</strong><br/>
        <span data-i18n="terms2Text">{t('terms2Text')}</span><br/><br/>
        <strong data-i18n="terms3Title" style={{color:T.text}}>{t('terms3Title')}</strong><br/>

        <Logo size={28} style={{margin:"0 auto 8px",display:"block"}}/><div data-i18n="footerAppName" style={{fontSize:16,fontWeight:800,color:T.text}}>{t('footerAppName')}</div><div data-i18n="versionLabel" style={{fontSize:11,color:T.textDim,marginTop:4}}>{t('versionLabel')}</div><div data-i18n="footerTagline" style={{fontSize:10,color:T.textMuted,marginTop:2}}>{t('footerTagline')}</div>
        <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid "+T.border,fontSize:11,color:T.textDim,lineHeight:1.5}}><span data-i18n="designedBy">{t('designedBy')}</span> <strong style={{color:T.text}}>Digital Reality</strong> & <strong style={{color:T.text}}>Nuova Bravol Srl</strong></div>

function App(){
  const[showSplash,setShowSplash]=useState(true);
  const[tab,setTab]=useState("calc");const[lastFocused,setLastFocused]=useState("vT");
  const[result,setResult]=useState(null);const[fillValue,setFillValue]=useState(null);const[fillCounter,setFillCounter]=useState(0);
  /* Step 5: force full re-render when language changes so every t() call re-evaluates */
  const[langKey,setLangKey]=useState(0);
  useEffect(function(){
    function handleLangChange(){setLangKey(function(k){return k+1;});}
    document.addEventListener('oilblend-langchange',handleLangChange);
    return function(){document.removeEventListener('oilblend-langchange',handleLangChange);};
  },[]);

  if(showSplash)return <Splash onDone={function(){setShowSplash(false);}}/>;

  function handleISOTap(m){setFillValue(m);setFillCounter(function(c){return c+1;});setTab("calc");}

  var tabs=[{id:"calc",label:t('tabCalc'),i18nKey:"tabCalc",Icon:CalcIcon},{id:"table",label:t('tabISO'),i18nKey:"tabISO",Icon:TblIcon},{id:"info",label:t('tabInfo'),i18nKey:"tabInfo",Icon:InfoIcon}];

  return(
    <div style={{maxWidth:430,margin:"0 auto",height:"100%",background:"linear-gradient(175deg,"+T.bg+" 0%,#0a0d1a 50%,"+T.bg+" 100%)",fontFamily:T.font,color:T.text,display:"flex",flexDirection:"column",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-100,right:-60,width:280,height:280,borderRadius:"50%",background:"radial-gradient(circle,rgba(61,128,234,0.06),transparent 70%)",pointerEvents:"none"}}/>
      <div style={{padding:"max(env(safe-area-inset-top,8px),8px) 18px 8px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid "+T.border,flexShrink:0}}>
        <Logo size={26}/><div data-i18n="footerAppName" style={{fontSize:15,fontWeight:800,letterSpacing:-.3,background:"linear-gradient(90deg,#3d80ea,#3dc7ec)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>{t('footerAppName')}</div>
      </div>
      <div className="content-scroll">
        {tab==="calc"&&<CalcScreen key={fillCounter} lastFocused={lastFocused} setLastFocused={setLastFocused} result={result} setResult={setResult} fillValue={fillValue}/>}
        {tab==="table"&&<ISOScreen result={result} onTap={handleISOTap}/>}
        {tab==="info"&&<InfoScreen/>}
      </div>
      <div className="bottom-nav"><div style={{display:"flex",paddingTop:8}}>
        {tabs.map(function(tb){var a=tab===tb.id;return(<button key={tb.id} onClick={function(){setTab(tb.id);}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"4px 0",fontFamily:T.font}}><div style={{padding:"4px 14px",borderRadius:16,background:a?T.accentDim:"transparent",transition:"background 0.25s"}}><tb.Icon active={a}/></div><span data-i18n={tb.i18nKey} style={{fontSize:10,fontWeight:a?700:500,color:a?T.accent:T.textMuted,letterSpacing:.3}}>{tb.label}</span></button>);})}
      </div></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>

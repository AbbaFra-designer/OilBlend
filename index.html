/* ══════ CALC ══════ */
function calculateBlend(v1,v2,vT){var sw=false;if(v1<v2){var t=v1;v1=v2;v2=t;sw=true;}if(v1<=2||v2<=2||vT<=2)throw new Error("Viscosità deve essere > 2 mm²/s");if(vT>=v1||vT<=v2)throw new Error("Target fuori range: deve essere tra i due oli");var W=function(v){return Math.log10(Math.log10(v+0.8));};var x=(W(vT)-W(v2))/(W(v1)-W(v2));return{oil1Pct:x*100,oil2Pct:(1-x)*100,swapped:sw};}

function findISO(v){if(!v||isNaN(v))return null;return ISO_VG.find(function(g){return v>=g.n&&v<=g.x;})||null;}

/* ══════════════════════════════════════
   AUTH SCREEN — Accesso Semplificato
   ══════════════════════════════════════ */
function AuthScreen({onAuth}){
  const[showSplash,setShowSplash]=useState(true);
  const[name,setName]=useState("");const[company,setCompany]=useState("");
  const[email,setEmail]=useState("");const[phone,setPhone]=useState("");
  const[loading,setLoading]=useState(false);const[err,setErr]=useState(null);

  useEffect(function(){var t=setTimeout(function(){setShowSplash(false);},3200);return function(){clearTimeout(t);};},[]);

  if(showSplash)return <Splash onDone={function(){setShowSplash(false);}}/>;

  var is={width:"100%",boxSizing:"border-box",padding:"15px 16px",fontSize:16,fontWeight:500,fontFamily:T.font,background:"rgba(255,255,255,0.05)",border:"1.5px solid "+T.border,borderRadius:12,color:T.text,outline:"none"};

  async function handleAccess(){
    if(!email.trim()){setErr("Inserisci la tua email");return;}
    if(!/\S+@\S+\.\S+/.test(email)){setErr("Email non valida");return;}
    setLoading(true);setErr(null);
    try{
      // 1) Verifica se esiste già un utente con questa email
      var res=await fetch(SB_URL+"/rest/v1/oilblend_users?email=eq."+encodeURIComponent(email.trim())+"&select=*",{method:"GET",headers:HD});
      if(!res.ok)throw new Error("Errore server");
      var data=await res.json();
      if(data&&data.length>0){
        // Utente esistente: usa i dati dal DB
        var u=data[0];sSet("oilblend_user",u);onAuth(u);
      }else{
        // Nuovo utente: servono anche nome, azienda e telefono
        if(!name.trim()||!company.trim()||!phone.trim()){
          setErr("Per il primo accesso compila nome, azienda e telefono");
          setLoading(false);
          return;
        }
        await sbInsert("oilblend_users",{name:name.trim(),company:company.trim(),email:email.trim(),phone:phone.trim()});
        var u={name:name.trim(),company:company.trim(),email:email.trim(),phone:phone.trim()};
        sSet("oilblend_user",u);onAuth(u);
      }
    }catch(e){setErr(e.message||"Errore di connessione");}
    setLoading(false);
  }

  var regFields=[
    {k:"name",l:"Nome e Cognome",v:name,s:setName,p:"Mario Rossi",t:"text",i:"👤",d:0},
    {k:"company",l:"Azienda",v:company,s:setCompany,p:"Es. Petroli SpA",t:"text",i:"🏭",d:.06},
    {k:"email",l:"Email",v:email,s:setEmail,p:"mario@azienda.it",t:"email",i:"✉️",d:.12},
    {k:"phone",l:"Telefono",v:phone,s:setPhone,p:"+39 333 1234567",t:"tel",i:"📱",d:.18},
  ];

  return(
    <div style={{position:"fixed",inset:0,zIndex:90,background:"radial-gradient(ellipse at 50% 20%,#1a2340 0%,#0F1120 70%)",display:"flex",flexDirection:"column",overflow:"auto",WebkitOverflowScrolling:"touch"}}>
      <div style={{textAlign:"center",padding:"max(env(safe-area-inset-top,20px),40px) 24px 16px",flexShrink:0}}>
        <div style={{animation:"dropFall 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards"}}><Logo size={Math.min(56,window.innerWidth*.14)}/></div>
        <div style={{marginTop:14,fontSize:Math.min(26,window.innerWidth*.065),fontWeight:900,letterSpacing:-.5,background:"linear-gradient(135deg,#3d80ea,#3dc7ec)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",animation:"fadeUp 0.6s ease-out 0.3s both"}}>Accedi a OilBlend</div>
        <div style={{marginTop:6,fontSize:13,color:T.textDim,animation:"fadeUp 0.6s ease-out 0.5s both"}}>Se l'email esiste entri subito, altrimenti creiamo il tuo profilo.</div>
      </div>
      <div style={{padding:"0 24px 40px",flex:1}}>
        {regFields.map(function(f){return(
          <div key={f.k} className="onboard-field" style={{marginBottom:14,animationDelay:(0.6+f.d)+"s"}}>
            <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,fontWeight:700,color:T.textDim,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}><span>{f.i}</span> {f.l}</label>
            <input
              type={f.t}
              value={f.v}
              placeholder={f.p}
              onChange={function(e){f.s(e.target.value);}}
              onKeyDown={function(e){if(e.key==="Enter")handleAccess();}}
              style={is}
            />
          </div>
        );})}

        {err&&<div style={{padding:"10px 14px",borderRadius:10,background:T.redDim,border:"1px solid "+T.redBorder,fontSize:13,color:T.red,marginBottom:14}}>{err}</div>}

        <div className="onboard-field" style={{animationDelay:"1s",marginTop:20}}>
          <button className="btn-primary" onClick={handleAccess} disabled={loading} style={{opacity:loading?.7:1,backgroundSize:loading?"200% 100%":"100% 100%",animation:loading?"shimmer 1.5s linear infinite":"none"}}>
            {loading?"Caricamento...":"ENTRA"}
          </button>

      {F("Nome",u.name)}{F("Azienda",u.company)}{F("Email",u.email)}{F("Telefono",u.phone)}

      {/* Profile Edit Modal */}
      {profEdit&&(<div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={function(){setProfEdit(false);}}><div style={{width:"100%",maxWidth:380,background:"#1a1e36",borderRadius:20,border:"1px solid "+T.accentBorder,padding:"24px 20px",boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}} onClick={function(e){e.stopPropagation();}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><h3 style={{fontSize:18,fontWeight:800,color:T.text,margin:0}}>Modifica Profilo</h3><button onClick={function(){setProfEdit(false);}} style={{background:"none",border:"none",color:T.textDim,fontSize:22,cursor:"pointer"}}>✕</button></div>
        {[{l:"Nome",v:pN,s:setPN},{l:"Azienda",v:pC,s:setPC},{l:"Email",v:pE,s:setPE},{l:"Telefono",v:pP,s:setPP}].map(function(f){return(<div key={f.l} style={{marginBottom:12}}><label style={{fontSize:11,fontWeight:700,color:T.textDim,textTransform:"uppercase",letterSpacing:1}}>{f.l}</label><input value={f.v} onChange={function(e){f.s(e.target.value);}} style={ei}/></div>);})}
        {pMsg&&<div style={{padding:"10px 12px",borderRadius:8,background:pMsg.t==="ok"?T.greenDim:T.redDim,border:"1px solid "+(pMsg.t==="ok"?T.greenBorder:T.redBorder),fontSize:12,color:pMsg.t==="ok"?T.green:T.red,marginBottom:12}}>{pMsg.m}</div>}
        <button onClick={saveProfEdit} disabled={pSaving} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:"linear-gradient(135deg,"+T.blue+","+T.cyan+")",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:T.font,textTransform:"uppercase",opacity:pSaving?.6:1}}>{pSaving?"...":"SALVA PROFILO"}</button>
      </div></div>)}

      <button onClick={p.onLogout} style={{marginTop:8,width:"100%",padding:"14px",borderRadius:12,border:"1.5px solid "+T.redBorder,background:T.redDim,color:T.red,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:T.font}}>Esci e Cancella Dati</button>

      {/* ── Admin ── */}
      <div style={{marginTop:32,paddingTop:24,borderTop:"1px solid "+T.border}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={adminOpen?T.accent:T.textDim} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span style={{fontSize:16,fontWeight:800,color:T.text}}>Area Admin</span>
        </div>
        {!adminOpen?(<div>
          <input type="password" value={aPwd} placeholder="Password admin" onChange={function(e){setAPwd(e.target.value);setAPwdErr(false);}} onKeyDown={function(e){if(e.key==="Enter")adminLogin();}} style={li}/>
          {aPwdErr&&<div style={{fontSize:12,color:T.red,marginTop:6,paddingLeft:4}}>Password errata</div>}
          <button onClick={adminLogin} style={{marginTop:12,width:"100%",padding:"14px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#EF5350,#FF8A65)",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:T.font,letterSpacing:.5,textTransform:"uppercase"}}>ACCEDI ADMIN</button>
        </div>):(<div>
          {/* Stats */}
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <div style={{flex:1,padding:"10px",borderRadius:12,background:T.accentDim,border:"1px solid "+T.accentBorder,textAlign:"center"}}><div style={{fontFamily:T.mono,fontSize:22,fontWeight:700,color:T.accent}}>{visits.length}</div><div style={{fontSize:9,color:T.textDim,fontWeight:700,textTransform:"uppercase"}}>Visite totali</div></div>
            <div style={{flex:1,padding:"10px",borderRadius:12,background:T.greenDim,border:"1px solid "+T.greenBorder,textAlign:"center"}}><div style={{fontFamily:T.mono,fontSize:22,fontWeight:700,color:T.green}}>{vToday}</div><div style={{fontSize:9,color:T.textDim,fontWeight:700,textTransform:"uppercase"}}>Oggi</div></div>
            <div style={{flex:"0 0 auto"}}><button onClick={loadVisits} style={{height:"100%",padding:"10px 14px",borderRadius:12,border:"1px solid "+T.accentBorder,background:T.accentDim,color:T.accent,fontSize:18,fontWeight:700,cursor:"pointer",fontFamily:T.font}}>{loading?"...":"↻"}</button></div>
          </div>
          {/* Search */}
          <div style={{position:"relative",marginBottom:14}}><input type="text" value={search} placeholder="Cerca nome, azienda, device..." onChange={function(e){setSearch(e.target.value);}} style={{width:"100%",boxSizing:"border-box",padding:"12px 16px 12px 40px",fontSize:14,fontWeight:500,fontFamily:T.font,background:T.bgInput,border:"1.5px solid "+T.border,borderRadius:12,color:T.text,outline:"none"}}/><span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:16,pointerEvents:"none"}}>🔍</span></div>
          {fetchErr&&<div style={{padding:"12px 14px",borderRadius:10,background:T.redDim,border:"1px solid "+T.redBorder,fontSize:12,color:T.red,marginBottom:12}}>{fetchErr}</div>}
          {loading&&<div style={{textAlign:"center",padding:30,color:T.textDim,fontSize:14}}>Caricamento...</div>}
          {!loading&&fv.length===0&&<div style={{textAlign:"center",padding:30,color:T.textDim,fontSize:14}}>{search?"Nessun risultato":"Nessun accesso"}</div>}
          {!loading&&fv.map(function(v,i){
            var d=v.visited_at?new Date(v.visited_at):null;var ds=d?d.toLocaleDateString("it-IT",{day:"2-digit",month:"short",year:"numeric"}):"—";var ts=d?d.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"";var iT=d&&d.toDateString()===today;
            var di=v.device==="iPhone"?"📱":v.device==="Android"?"🤖":v.device==="Mobile"?"📱":"💻";
            return(<div key={v.id||i} style={{padding:"12px 14px",borderRadius:12,background:iT?"rgba(102,187,106,0.04)":"rgba(255,255,255,0.015)",border:"1px solid "+(iT?T.greenBorder:T.border),marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:14}}>{di}</span><span style={{fontSize:14,fontWeight:700,color:T.text}}>{v.user_name||"?"}</span></div><div style={{fontSize:10,color:iT?T.green:T.textMuted,fontFamily:T.mono,fontWeight:600}}>{iT?"OGGI "+ts:ds+" "+ts}</div></div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,fontSize:11,color:T.textDim}}>{v.user_company&&v.user_company!=="—"&&<span style={{color:T.accent}}>🏭 {v.user_company}</span>}<span>{v.device} · {v.screen_size||"?"}</span>{v.user_email&&v.user_email!=="—"&&<span>✉️ {v.user_email}</span>}</div>
            </div>);
          })}
        </div>)}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   MAIN APP
   ══════════════════════════════════════ */
function App(){
  const[phase,setPhase]=useState("loading");const[user,setUser]=useState(null);
  const[tab,setTab]=useState("calc");const[lastFocused,setLastFocused]=useState("vT");
  const[result,setResult]=useState(null);const[fillValue,setFillValue]=useState(null);const[fillCounter,setFillCounter]=useState(0);

  useEffect(function(){var s=sGet("oilblend_user");if(s&&s.name&&s.email){setUser(s);setPhase("splash");}else{setPhase("auth");}},[]);

  function handleAuth(u){setUser(u);sSet("oilblend_user",u);setPhase("app");logVisit(u);}
  function handleSplashDone(){setPhase("app");logVisit(user);}
  function handleLogout(){sSet("oilblend_user",null);try{localStorage.removeItem("oilblend_user");}catch(e){}setUser(null);setResult(null);setPhase("auth");}
  function handleISOTap(m){setFillValue(m);setFillCounter(function(c){return c+1;});setTab("calc");}

  if(phase==="loading")return null;
  if(phase==="auth")return <AuthScreen onAuth={handleAuth}/>;
  if(phase==="splash")return <Splash onDone={handleSplashDone}/>;

  var tabs=[{id:"calc",label:"Calcolo",Icon:CalcIcon},{id:"table",label:"ISO VG",Icon:TblIcon},{id:"info",label:"Info",Icon:InfoIcon},{id:"profile",label:"Profilo",Icon:UserIcon}];

  return(
    <div style={{maxWidth:430,margin:"0 auto",height:"100%",background:"linear-gradient(175deg,"+T.bg+" 0%,#0a0d1a 50%,"+T.bg+" 100%)",fontFamily:T.font,color:T.text,display:"flex",flexDirection:"column",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-100,right:-60,width:280,height:280,borderRadius:"50%",background:"radial-gradient(circle,rgba(61,128,234,0.06),transparent 70%)",pointerEvents:"none"}}/>
      <div style={{padding:"max(env(safe-area-inset-top,8px),8px) 18px 8px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid "+T.border,flexShrink:0}}>
        <Logo size={26}/><div style={{fontSize:15,fontWeight:800,letterSpacing:-.3,background:"linear-gradient(90deg,#3d80ea,#3dc7ec)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>OilBlend</div>
        {user&&<div style={{marginLeft:"auto",fontSize:11,color:T.textDim}}>{user.name.split(" ")[0]}</div>}
      </div>
      <div className="content-scroll">
        {tab==="calc"&&<CalcScreen key={fillCounter} lastFocused={lastFocused} setLastFocused={setLastFocused} result={result} setResult={setResult} fillValue={fillValue}/>}
        {tab==="table"&&<ISOScreen result={result} onTap={handleISOTap}/>}
        {tab==="info"&&<InfoScreen/>}
        {tab==="profile"&&<ProfileScreen user={user} onLogout={handleLogout}/>}
      </div>
      <div className="bottom-nav"><div style={{display:"flex",paddingTop:8}}>
        {tabs.map(function(t){var a=tab===t.id;return(<button key={t.id} onClick={function(){setTab(t.id);}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"4px 0",fontFamily:T.font}}><div style={{padding:"4px 14px",borderRadius:16,background:a?T.accentDim:"transparent",transition:"background 0.25s"}}><t.Icon active={a}/></div><span style={{fontSize:10,fontWeight:a?700:500,color:a?T.accent:T.textMuted,letterSpacing:.3}}>{t.label}</span></button>);})}
      </div></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
